          - heading "Waves and Oscillations" [level=2] [ref=e217]
          - generic [ref=e218]: শুরু
        - generic [ref=e220]:
          - paragraph [ref=e221]: "Oscillation: Back-and-forth repetitive motion around mean position. Examples: pendulum, mass on spring, AC current."
          - paragraph
          - paragraph [ref=e222]: "Types of Oscillations:"
          - paragraph [ref=e223]: "• Free: Body oscillates without external force"
          - paragraph [ref=e224]: "• Forced: External periodic force keeps it oscillating"
          - paragraph [ref=e225]: "• Damped: Amplitude decreases due to friction/resistance"
          - paragraph [ref=e226]: "• Undamped: No energy loss, constant amplitude"
          - paragraph [ref=e227]: "• Resonance: External frequency = natural frequency → maximum amplitude"
          - paragraph
          - paragraph [ref=e228]: "Key Terms:"
          - paragraph [ref=e229]: "• Amplitude (A): Maximum displacement from mean position (meter)"
          - paragraph [ref=e230]: "• Time Period (T): Time for one complete oscillation (seconds)"
          - paragraph [ref=e231]: "• Frequency (f): Number of oscillations per second. f = 1/T in Hz"
          - paragraph [ref=e232]: "• Angular Frequency (ω): ω = 2πf (radians/sec)"
          - paragraph [ref=e233]: "• Phase (φ): Position of oscillation at any instant (radians)"
          - paragraph
          - paragraph [ref=e234]: "Simple Harmonic Motion (SHM): Simplest oscillation. Restoring force proportional to displacement: F = -kx. Equation: x(t) = A×sin(ωt + φ)."
          - paragraph
          - paragraph
          - paragraph [ref=e235]: "Wave: Disturbance transferring energy without transferring matter."
          - paragraph
          - paragraph [ref=e236]: "Types:"
          - paragraph [ref=e237]: "• Mechanical (require medium): sound, water waves"
          - paragraph [ref=e238]: "• Electromagnetic (no medium): light, radio"
          - paragraph [ref=e239]: "• Transverse: particle motion ⟂ wave direction"
          - paragraph [ref=e240]: "• Longitudinal: particle motion ∥ wave direction"
          - paragraph
          - paragraph [ref=e241]: "Wave Properties:"
          - paragraph [ref=e242]: "• Wavelength (λ): Distance between two crests (meter)"
          - paragraph [ref=e243]: "• Frequency (f): Number of cycles per second (Hertz)"
          - paragraph [ref=e244]: "• Wave speed (v): v = fλ (m/s)"
          - paragraph [ref=e245]: "• Amplitude (A): Height of crest (energy level)"
          - paragraph
          - paragraph
          - paragraph [ref=e246]: "Wave Phenomena:"
          - paragraph [ref=e247]: "• Reflection: Wave bounces back from surface"
          - paragraph [ref=e248]: "• Refraction: Wave bends passing into another medium"
          - paragraph [ref=e249]: "• Diffraction: Wave bends around obstacles"
          - paragraph [ref=e250]: "• Interference: Two waves overlap to form resultant wave"
          - paragraph [ref=e251]: "• Standing Waves: Appear stationary due to interference"
