        - generic [ref=e319]:
          - paragraph [ref=e320]: "Electromagnetic Waves: Oscillations of electric and magnetic fields traveling through space. Don't require medium. Produced by accelerating charges. E and B fields perpendicular to each other and wave direction. Formula: c = λν."
          - paragraph
          - paragraph [ref=e321]: "EM Spectrum:"
          - paragraph [ref=e322]: "• Radio waves: λ > 1m"
          - paragraph [ref=e323]: "• Microwaves: 1m - 1mm"
          - paragraph [ref=e324]: "• Infrared: 1mm - 700nm"
          - paragraph [ref=e325]: "• Visible light: 700-400nm"
          - paragraph [ref=e326]: "• Ultraviolet: 400-10nm"
          - paragraph [ref=e327]: "• X-rays: 10-0.01nm"
          - paragraph [ref=e328]: "• Gamma rays: < 0.01nm"
          - paragraph
          - paragraph [ref=e329]: "Photoelectric Effect: Light shining on metal surface emits electrons (photoelectrons)."
          - paragraph [ref=e330]: "Facts:"
          - paragraph [ref=e331]: • No electrons below threshold frequency
          - paragraph [ref=e332]: • Intensity affects number, not energy
          - paragraph [ref=e333]: • Energy depends on frequency, not intensity
          - paragraph
          - paragraph [ref=e334]: "Einstein's Explanation: Light behaves as particles (photons). Energy: E = hν (h = 6.626 × 10⁻³⁴ Js). If photon energy > work function, electrons emitted: hν = φ + ½mv²"
          - paragraph
          - paragraph [ref=e335]: "Quantum Theory: Light has dual nature (wave-particle duality). Photon: quantum of EM energy. E = hν, p = h/λ."
          - paragraph
          - paragraph [ref=e336]: "X-rays: High-energy EM waves produced when high-speed electrons strike metal. Used in medical imaging, crystallography."
          - paragraph [ref=e337]: "X-ray Diffraction: Bragg's Law: nλ = 2d×sinθ"
          - paragraph [ref=e338]: "Compton Effect: X-ray scattering by electrons causes wavelength change. Δλ = h/(mₑc) × (1 - cosθ)"
          - paragraph
          - paragraph [ref=e339]: "De Broglie Waves: Particles have wave-like properties. Formula: λ = h/p (p = momentum)"
