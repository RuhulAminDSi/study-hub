          - heading "তড়িৎচুম্বকত্বের মূল ধারণা" [level=2] [ref=e177]
          - generic [ref=e178]: শুরু
        - generic [ref=e180]:
          - paragraph [ref=e181]: আধান, কুলম্বের সূত্র, তড়িৎক্ষেত্র, গাউসের সূত্র, তড়িৎবিভব, চুম্বকক্ষেত্র, ফ্যারাডের সূত্র, ম্যাক্সওয়েলের সমীকরণ।
          - paragraph
          - paragraph [ref=e182]: "⚡ আধান: পদার্থের একটি মৌলিক ধর্ম যা তড়িৎচুম্বকীয় মিথস্ক্রিয়া সৃষ্টি করে। প্রকার: ধনবাহী (+) এবং ঋণবাহী (-)। একক: কুলম্ব (C)। সংরক্ষণ: আ��ান তৈরি বা ধ্বংস করা যায় না, শুধু স্থানান্তর করা যায়।"
          - paragraph
          - paragraph [ref=e183]: "⚡ কুলম্বের সূত্র: দুটি তড়িৎআধানের মধ্যে বল: F = k(q1×q2)/r²। বল বিপরীত আধানের জন্য আকর্ষণকারক, একই রকম আধানের জন্য বিকর্ষণকারক।"
          - paragraph
          - paragraph [ref=e184]: "⚡ তড়িৎক্ষেত্র (E): চার্জযুক্ত কণার চারপাশে অঞ্চল যেখানে এটি অন্যান্য আধানের উপর বল প্রয়োগ করে। E = F/q। একক: N/C বা V/m। দিক: ধনবাহী থেকে দূরে, ঋণবাহীর দিকে।"
          - paragraph
          - paragraph [ref=e185]: "⚡ গাউসের সূত্র: বদ্ধ পৃষ্ঠের মধ্য দিয়ে তড়িৎফ্লাক্স = আবদ্ধ আধান/ε₀। প্রতিসম আধান বিতরণের তড়িৎক্ষেত্র গণনা করতে ব্যবহৃত হয়।"
          - paragraph
          - paragraph [ref=e186]: "⚡ তড়িৎবিভব (V): অসীম থেকে একটি বিন্দুতে একক ধনবাহী আধান আনতে করা কাজ। V = W/q। একক: ভোল্ট (V)। সম্পর্ক: E = -dV/dx।"
          - paragraph
          - paragraph [ref=e187]: "🧲 চুম্বকক্ষেত্র: চলমান আধান ব চুম্বকের চারপাশে অঞ্চল যেখানে চুম্বকীয় বল কাজ করে। একক: টেসলা (T)। চলমান আধান এবং স্থায়ী চুম্বক দ্বারা তৈরি। ডান-হাতের নিয়ম: বুড়ো = প্রবাহের দিক, আঙুল = চুম্বকক্ষেত্রের দিক।"
          - paragraph
          - paragraph [ref=e188]: "🧲 ফ্যারাডের সূত্র: পরিবর্তনশীল চুম্বকক্ষেত্র EMF প্রবর্তন করে। EMF = -dΦB/dt। মূল: পরিবর্তনশীল চুম্বকক্ষেত্র → আবিষ্ট ভোল্টেজ → আবিষ্ট প্রবাহ।"
          - paragraph
          - paragraph [ref=e189]: "🌐 ম্যাক্সওয়েলের সমীকরণ (৪টি মৌলিক সূত্র):"
          - paragraph [ref=e190]: ১. ∇·E = ρ/ε₀ (বিদ্যুতের জন্য গাউসের সূত্র)
          - paragraph [ref=e191]: ২. ∇·B = ০ (চুম্বকত্বের জন্য গাউসের সূত্র - একক চুম্বক নেই)
          - paragraph [ref=e192]: ৩. ∇×E = -∂B/∂t (ফ্যারাডের সূত্র)
          - paragraph [ref=e193]: ৪. ∇×B = μ₀J + μ₀ε₀(∂E/∂t) (অ্যাম্পিয়ার-ম্যাক্সওয়েল সূত্র)
