        - generic [ref=e278]:
          - paragraph [ref=e279]: Theory of Special Relativity (Einstein, 1905) explains how space, time, and motion relate at speeds near light.
          - paragraph
          - paragraph [ref=e280]: "Two Postulates:"
          - paragraph [ref=e281]: "1. Principle of Relativity: Laws of physics identical in all inertial frames. No absolute rest."
          - paragraph [ref=e282]: "2. Constancy of Speed of Light: c = 3×10⁸ m/s same for all observers."
          - paragraph
          - paragraph [ref=e283]: "Consequences:"
          - paragraph
          - paragraph [ref=e284]: "a) Time Dilation: Moving clocks run slower."
          - paragraph [ref=e285]: t = t₀ / √(1 - v²/c²)
          - paragraph
          - paragraph [ref=e286]: "b) Length Contraction: Moving objects appear shorter."
          - paragraph [ref=e287]: L = L₀ × √(1 - v²/c²)
          - paragraph
          - paragraph [ref=e288]: "c) Relativity of Simultaneity: Events simultaneous in one frame may not be in another."
          - paragraph
          - paragraph [ref=e289]: "d) Mass-Energy Equivalence: E = mc² (mass and energy interchangeable)"
          - paragraph
          - paragraph [ref=e290]: "e) Mass Increase with Velocity: m = m₀ / √(1 - v²/c²)"
          - paragraph
          - paragraph [ref=e291]: "Spacetime: 4-dimensional entity with coordinates (x, y, z, t)."
          - paragraph
          - paragraph [ref=e292]: "Applications: GPS (time dilation), particle accelerators, nuclear energy, astrophysics."
