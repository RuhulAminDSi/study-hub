    - heading "Waves and Oscillations" [level=2] [ref=e90]
    - generic [ref=e53]:
      - paragraph [ref=e54]: "Oscillation: Back-and-forth repetitive motion around mean position. Examples: pendulum, mass on spring, AC current."
      - paragraph
      - paragraph [ref=e55]: "Types of Oscillations:"
      - paragraph [ref=e91]: "• Free: Body oscillates without external force"
      - paragraph [ref=e56]: "• Forced: External periodic force keeps it oscillating"
      - paragraph [ref=e92]: "• Damped: Amplitude decreases due to friction"
      - paragraph [ref=e57]: "• Undamped: No energy loss, constant amplitude"
      - paragraph [ref=e93]: "• Resonance: External frequency = natural frequency → maximum amplitude"
      - paragraph
      - paragraph [ref=e94]: "Key Terms:"
      - paragraph [ref=e59]: "• Amplitude (A): Maximum displacement from mean"
      - paragraph [ref=e95]: "• Time Period (T): Time for one complete oscillation"
      - paragraph [ref=e60]: "• Frequency (f): Number of oscillations per second. f = 1/T in Hz"
      - paragraph [ref=e96]: "• Angular Frequency (ω): ω = 2πf"
      - paragraph
      - paragraph [ref=e97]: "Simple Harmonic Motion (SHM): Simplest oscillation. Restoring force F = -kx. Equation: x(t) = A×sin(ωt + φ)."
      - paragraph
      - paragraph [ref=e98]: "Wave: Disturbance transferring energy without transferring matter."
      - paragraph
      - paragraph [ref=e99]: "Types:"
      - paragraph [ref=e100]: "• Mechanical (require medium): sound, water waves"
      - paragraph [ref=e101]: "• Electromagnetic (no medium): light, radio"
      - paragraph [ref=e102]: "• Transverse: particle motion ⟂ wave direction"
      - paragraph [ref=e103]: "• Longitudinal: particle motion ∥ wave direction"
      - paragraph
      - paragraph [ref=e104]: "Wave Properties: Wavelength (λ), Frequency (f), Wave speed (v = fλ), Amplitude (A)."
      - paragraph
      - paragraph [ref=e105]: "Wave Phenomena: Reflection, Refraction, Diffraction, Interference, Standing Waves."
