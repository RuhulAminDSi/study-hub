    - heading "Electromagnetism Basics" [level=2] [ref=e52]
    - generic [ref=e53]:
      - paragraph [ref=e54]: Charge, Coulomb's law, electric field, Gauss's law, electric potential, magnetic field, Faraday's law, Maxwell's equations.
      - paragraph
      - paragraph [ref=e55]: "⚡ Charge: Fundamental property of matter causing electromagnetic interaction. Types: Positive (+) and Negative (-). Unit: Coulomb (C). Conservation: Charge cannot be created/destroyed, only transferred."
      - paragraph
      - paragraph [ref=e56]: "⚡ Coulomb's Law: Force between two electric charges: F = k(q1×q2)/r². Force is attractive for opposite charges, repulsive for like charges."
      - paragraph
      - paragraph [ref=e57]: "⚡ Electric Field (E): Region around charged particle where it exerts force on other charges. E = F/q. Unit: N/C or V/m."
      - paragraph
      - paragraph [ref=e58]: "⚡ Gauss's Law: Electric flux through closed surface = enclosed charge/ε₀. Used to calculate electric field of symmetric charge distributions."
      - paragraph
      - paragraph [ref=e59]: "⚡ Electric Potential (V): Work done bringing unit positive charge from infinity to a point. V = W/q. Unit: Volt (V)."
      - paragraph
      - paragraph [ref=e60]: "🧲 Magnetic Field: Region around moving charge or magnet where magnetic forces act. Unit: Tesla (T). Created by moving charges and permanent magnets."
      - paragraph
      - paragraph [ref=e61]: "🧲 Faraday's Law: Changing magnetic field induces EMF. EMF = -dΦB/dt."
      - paragraph
      - paragraph [ref=e62]: "🌐 Maxwell's Equations: 4 fundamental laws describing all classical electromagnetism."
    - generic [ref=e63]:
